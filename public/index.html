<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>What Should We Eat?</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>🍽️ What Should We Eat?</h1>
    </header>

    <main id="view-root">
      <!-- Landing -->
      <section id="view-landing" class="view">
        <p class="tagline">Swipe together. First dish you both like wins.</p>
        <div class="card-panel">
          <button id="btn-create-room" class="btn btn-primary">Start a new session</button>
        </div>
        <div class="card-panel">
          <label for="input-room-code">Have a code?</label>
          <div class="join-row">
            <input id="input-room-code" maxlength="5" placeholder="ABCDE" autocomplete="off" autocapitalize="characters" />
            <button id="btn-join-room" class="btn btn-secondary">Join</button>
          </div>
        </div>
        <p id="landing-error" class="error-text" hidden></p>
      </section>

      <!-- Waiting -->
      <section id="view-waiting" class="view" hidden>
        <p>Share this with your partner:</p>
        <div class="room-code-display" id="room-code-display"></div>
        <button id="btn-copy-link" class="btn btn-secondary">Copy invite link</button>
        <div class="spinner"></div>
        <p>Waiting for them to join…</p>
      </section>

      <!-- Swipe -->
      <section id="view-swipe" class="view" hidden>
        <div class="progress-row">
          <span id="progress-text"></span>
          <span id="opponent-banner" class="opponent-banner" hidden></span>
        </div>
        <div id="card-stack" class="card-stack"></div>
        <div class="swipe-buttons">
          <button id="btn-pass" class="btn btn-round btn-pass" aria-label="Pass">✕</button>
          <button id="btn-like" class="btn btn-round btn-like" aria-label="Like">♥</button>
        </div>
      </section>

      <!-- Match -->
      <section id="view-match" class="view" hidden>
        <div class="match-celebration">
          <h2>It's a Match! 🎉</h2>
          <div class="match-card" id="match-card"></div>
          <button id="btn-restart-from-match" class="btn btn-primary">New Round</button>
        </div>
      </section>

      <!-- No match -->
      <section id="view-nomatch" class="view" hidden>
        <h2>No match this round 🤷</h2>
        <p>You two are picky. Try again with a fresh deck?</p>
        <button id="btn-restart-from-nomatch" class="btn btn-primary">Try Again</button>
      </section>
    </main>
  </div>

  <script src="/js/wsClient.js"></script>
  <script src="/js/swipeDeck.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
